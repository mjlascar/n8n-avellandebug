services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: n8n_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - n8n_postgres_data:/var/lib/postgresql/data
    networks:
      - n8n_network
    shm_size: '128mb' # Aumenta la memoria compartida para evitar errores de Postgres en Docker
    deploy:
      resources:
        limits:
          memory: 768M  # Límite máximo para la base de datos
        reservations:
          memory: 256M  # Memoria mínima garantizada

  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    restart: unless-stopped
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: ${POSTGRES_DB}
      DB_POSTGRESDB_USER: ${POSTGRES_USER}
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD}
      N8N_DEFAULT_BINARY_DATA_MODE: filesystem

      WEBHOOK_URL: https://${DOMAIN}
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}
      TZ: America/Argentina/Buenos_Aires

      EXECUTIONS_DATA_PRUNE: "true" # Activa el borrado automático
      EXECUTIONS_DATA_MAX_AGE: 168 # Guarda solo los últimos 7 días (168 horas)
      EXECUTIONS_DATA_PRUNE_MAX_COUNT: 50000 # O borra si superás los 50.000 registros
      EXECUTIONS_PROCESS_DATABASE_BINARIES: "true" # Ayuda a que los archivos pesados no saturen la RAM

    volumes:
      - n8n_data:/home/node/.n8n
    networks:
      - n8n_network
    depends_on:
      - postgres
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 400M

  evolution-api:
    image: atendai/evolution-api:latest
    container_name: evolution_api
    restart: unless-stopped
    environment:
      - SERVER_URL=https://${EVOLUTION_DOMAIN}
      - DEL_INSTANCE=false
      # Configuración de Base de Datos (PostgreSQL)
      - DATABASE_PROVIDER=postgresql
      - DATABASE_CONNECTION_URI=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=evolution
      - DATABASE_CONNECTION_CLIENT_NAME=evolution_api
      # Configuración de Caché/Sesiones (Redis)
      - REDIS_ENABLED=true
      - REDIS_URI=redis://:${REDIS_PASSWORD}@redis:6379/1
      - REDIS_PREFIX_KEY=evolution
      # Seguridad
      - AUTHENTICATION_API_KEY=${EVOLUTION_API_KEY}
      - AUTHENTICATION_EXPOSE_IN_ENV=true
      # Webhooks hacia n8n
      - WEBHOOK_GLOBAL_URL=https://${DOMAIN}/webhook/evolution-events
      - WEBHOOK_GLOBAL_ENABLED=true
      - WEBHOOK_GLOBAL_EVENTS=APPLICATION_STARTUP,QRCODE_UPDATED,MESSAGES_UPSERT,MESSAGES_UPDATE,MESSAGES_DELETE,SEND_MESSAGE,CONNECTION_UPDATE,CALL
    networks:
      - n8n_network
    depends_on:
      - postgres
      - redis
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M


  caddy:
    image: caddy:2
    container_name: caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    env_file:
      - .env
    volumes:
      - ./conf:/etc/caddy
      - ./caddy_logs:/var/log/caddy
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - n8n_network
    deploy:
      resources:
        limits:
          memory: 256M  # Caddy es eficiente pero Go consume algo de RAM
        reservations:
          memory: 64M

  redis:
    image: redis:7-alpine
    container_name: db_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    networks:
      - n8n_network
    deploy:
      resources:
        limits:
          memory: 256M  # Redis es muy liviano
        reservations:
          memory: 64M

networks:
  n8n_network:

volumes:
  caddy_data:
  caddy_config:
  n8n_postgres_data:
  n8n_data:
  redis_data:
